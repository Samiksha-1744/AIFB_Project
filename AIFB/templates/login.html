<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d14;
      --card:     #13131f;
      --border:   #1e1e30;
      --accent:   #00d4aa;
      --accent2:  #7b5ea7;
      --text:     #e8e8f0;
      --muted:    #6b6b85;
      --danger:   #ff6b6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,212,170,.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(123,94,167,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      position: relative;
      animation: rise .5s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field { margin-bottom: 20px; }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #00b38f);
      border: none;
      border-radius: 10px;
      color: #0d0d14;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      margin-top: 8px;
      transition: opacity .2s, transform .15s;
    }

    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.98); }

    .error-msg {
      background: rgba(255,107,107,.1);
      border: 1px solid rgba(255,107,107,.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .hint {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hint code {
      background: var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💳</div>
      <span class="logo-text">PayFlow</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your wallet</p>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input name="username" type="text" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit">Sign In →</button>
    </form>

    <p class="hint">Demo credentials: <code>admin</code> / <code>1234</code></p>
  </div>
</body>
</html>
